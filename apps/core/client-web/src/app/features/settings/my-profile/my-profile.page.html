<div class="profile-page">

  <!-- ── Profile Banner ──────────────────────────────────────────── -->
  <div class="profile-card profile-banner">
    <div class="p-avatar-wrap">
      <div class="p-avatar-halo" aria-hidden="true"></div>
      <div class="p-avatar">
        <img [src]="avatarPreview() || 'assets/images/default-avatar.svg'" alt="Avatar">
      </div>
      <label class="p-avatar-upload" [title]="'SETTINGS.PROFILE.CHANGE_AVATAR' | translate">
        <lucide-icon [img]="ImageIcon" size="16"></lucide-icon>
        <input type="file" class="visually-hidden" (change)="onFileSelected($event)" accept="image/*">
      </label>
    </div>

    <div class="p-banner-info">
      <h1 class="p-banner-name">{{ currentUser()?.firstName }} {{ currentUser()?.lastName }}</h1>
      <p class="p-banner-email">{{ currentUser()?.email }}</p>
      <span class="p-banner-role">{{ currentUser()?.roles?.[0]?.name || 'Usuario' }}</span>
    </div>
  </div>

  <!-- ── Two-column grid ─────────────────────────────────────────── -->
  <div class="profile-grid">

    <!-- Left: Personal info -->
    <div class="profile-card">
      <div class="profile-card__head">
        <lucide-icon [img]="UserIcon" size="18"></lucide-icon>
        <h2>{{ 'SETTINGS.PROFILE.PERSONAL_INFO' | translate }}</h2>
      </div>
      <div class="profile-card__body">
        <form [formGroup]="profileForm" (ngSubmit)="saveProfile()">
          <div class="pf-grid-2">
            <div class="pf-field">
              <label class="pf-label">{{ 'SETTINGS.PROFILE.FIRST_NAME' | translate }}</label>
              <input type="text" formControlName="firstName" placeholder="Juan">
            </div>
            <div class="pf-field">
              <label class="pf-label">{{ 'SETTINGS.PROFILE.LAST_NAME' | translate }}</label>
              <input type="text" formControlName="lastName" placeholder="Pérez">
            </div>
          </div>

          <div class="pf-field">
            <label class="pf-label">{{ 'SETTINGS.PROFILE.EMAIL' | translate }}</label>
            <div class="pf-icon-wrap">
              <lucide-icon [img]="MailIcon" size="16" class="pf-icon"></lucide-icon>
              <input type="email" formControlName="email" class="has-icon" readonly>
            </div>
          </div>

          <div class="pf-field">
            <label class="pf-label">{{ 'SETTINGS.PROFILE.PHONE' | translate }}</label>
            <div class="pf-phone-row">
              <div class="pf-icon-wrap pf-icon-wrap--grow">
                <lucide-icon [img]="PhoneIcon" size="16" class="pf-icon"></lucide-icon>
                <input type="tel" formControlName="phone" class="has-icon" placeholder="+1 (809) 000-0000">
              </div>
              <button type="button" class="pf-verify-btn" (click)="openPhoneVerification()">
                {{ 'SETTINGS.PROFILE.VERIFY' | translate }}
              </button>
            </div>
          </div>

          <div class="pf-field">
            <label class="pf-label">{{ 'SETTINGS.PROFILE.JOB_TITLE' | translate }}</label>
            <div class="pf-icon-wrap">
              <lucide-icon [img]="CompanyIcon" size="16" class="pf-icon"></lucide-icon>
              <select formControlName="jobTitle" class="has-icon">
                <option value="" disabled>{{ 'SETTINGS.PROFILE.SELECT_JOB_TITLE' | translate }}</option>
                <option *ngFor="let title of jobTitles()" [value]="title">{{ title }}</option>
              </select>
            </div>
          </div>

          <div class="pf-field">
            <label class="pf-label">Idioma Preferido</label>
            <select formControlName="preferredLanguage">
              <option value="es">Español</option>
              <option value="en">English</option>
            </select>
          </div>

          <div class="pf-actions">
            <button type="submit"
                    [disabled]="profileForm.invalid || profileForm.pristine || isLoading"
                    class="pf-btn-primary">
              @if (isLoading) {
                <span class="pf-spinner"></span>
              } @else {
                <lucide-icon [img]="SaveIcon" size="16"></lucide-icon>
              }
              {{ 'SETTINGS.PROFILE.SAVE_CHANGES' | translate }}
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Right: Password + 2FA + Sessions -->
    <div class="profile-right-col">

      <!-- Password card -->
      <div class="profile-card">
        <div class="profile-card__head">
          <lucide-icon [img]="ShieldIcon" size="18"></lucide-icon>
          <h2>{{ 'SETTINGS.PROFILE.SECURITY' | translate }}</h2>
        </div>
        <div class="profile-card__body">
          <form [formGroup]="passwordForm" (ngSubmit)="changePassword()">
            <!-- Hidden username field for password managers -->
            <input type="text" autocomplete="username"
                   style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none"
                   [value]="currentUser()?.email">

            <div class="pf-field">
              <label class="pf-label">{{ 'SETTINGS.PROFILE.NEW_PASSWORD' | translate }}</label>
              <input type="password" formControlName="newPassword" autocomplete="new-password" placeholder="••••••••">
            </div>
            <div class="pf-field">
              <label class="pf-label">{{ 'SETTINGS.PROFILE.CONFIRM_PASSWORD' | translate }}</label>
              <input type="password" formControlName="confirmPassword" autocomplete="new-password" placeholder="••••••••">
            </div>

            <div class="pf-actions">
              <button type="submit" [disabled]="passwordForm.invalid" class="pf-btn-secondary">
                {{ 'SETTINGS.PROFILE.UPDATE_PASSWORD' | translate }}
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- 2FA & Sessions (security-settings component) -->
      <app-security-settings></app-security-settings>

    </div>
  </div>
</div>

<!-- Phone Verification Modal -->
<app-phone-verification-modal
   [isOpen]="showPhoneModal"
   (close)="showPhoneModal.set(false)"
   (verified)="onPhoneVerified()">
</app-phone-verification-modal>
