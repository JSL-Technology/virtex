<footer class="auth-footer">
  <div class="footer-container">

    <div class="footer-top">
      <div class="language-selector">
        <button
          type="button"
          class="selector-trigger"
          (click)="toggleLangDropdown($event)"
          [class.active]="isLangDropdownOpen"
          aria-label="Select Language">
          <lucide-icon [img]="icons.Globe" size="16"></lucide-icon>
          <span>{{ currentLangLabel }}</span>
          <lucide-icon [img]="icons.ChevronUp" size="14" class="chevron" [class.open]="isLangDropdownOpen"></lucide-icon>
        </button>

        <div class="dropdown-menu" [class.show]="isLangDropdownOpen">
          <button
            type="button"
            class="dropdown-item"
            *ngFor="let lang of availableLanguages"
            [class.active]="currentLang === lang.code"
            (click)="changeLang(lang.code)">
            <span>{{ lang.label }}</span>
            <lucide-icon *ngIf="currentLang === lang.code" [img]="icons.Check" size="14"></lucide-icon>
          </button>
        </div>
      </div>

      <nav class="footer-nav">
        <a routerLink="/terms">{{ 'AUTH.TERMS' | translate }}</a>
        <a routerLink="/privacy">{{ 'AUTH.PRIVACY' | translate }}</a>
        <a routerLink="/security">{{ 'AUTH.SECURITY' | translate }}</a>
        <a routerLink="/contact">{{ 'AUTH.CONTACT' | translate }}</a>
      </nav>
    </div>

    <div class="footer-bottom">
      <p class="copyright">
        &copy; {{ currentYear }} Virteex. {{ 'AUTH.ALL_RIGHTS_RESERVED' | translate }}
      </p>
    </div>

  </div>
</footer>
