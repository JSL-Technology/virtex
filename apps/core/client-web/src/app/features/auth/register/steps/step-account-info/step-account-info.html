<div class="step-container" [formGroup]="group">
  <div class="step-header">
    <h3 class="step-title">{{ 'REGISTER.STEPS.ACCOUNT.TITLE_INTERNAL' | translate }}</h3>
    <p class="step-subtitle">{{ 'REGISTER.STEPS.ACCOUNT.SUBTITLE_INTERNAL' | translate }}</p>
  </div>

  <div class="avatar-upload-section">
    <div class="avatar-container">
      <input type="file" id="avatarUrl" (change)="onFileSelected($event)" #avatarUpload
             accept="image/png, image/jpeg" class="hidden-input">
      <label for="avatarUrl" class="avatar-label">
        <ng-container *ngIf="avatarPreview(); else placeholder">
          <img [src]="avatarPreview()" alt="Avatar preview" class="avatar-img">
        </ng-container>
        <ng-template #placeholder>
          <div class="avatar-placeholder">
            <lucide-icon [img]="AvatarIcon" size="32"></lucide-icon>
            <span>{{ 'REGISTER.UPLOAD_PHOTO' | translate }}</span>
          </div>
        </ng-template>
        <div class="avatar-overlay">
          <lucide-icon [img]="CameraIcon" size="20"></lucide-icon>
        </div>
      </label>
    </div>
  </div>

  <div class="form-grid">
    <app-auth-input
      formControlName="firstName"
      [label]="'REGISTER.FIRST_NAME' | translate"
      [placeholder]="'REGISTER.FIRST_NAME_PLACEHOLDER' | translate"
      [required]="true"
      [hasIcon]="true"
      [errorMessage]="getErrorMessage('firstName')">
      <lucide-icon icon [img]="UserIcon" size="18"></lucide-icon>
    </app-auth-input>

    <app-auth-input
      formControlName="lastName"
      [label]="'REGISTER.LAST_NAME' | translate"
      [placeholder]="'REGISTER.LAST_NAME_PLACEHOLDER' | translate"
      [required]="true"
      [hasIcon]="true"
      [errorMessage]="getErrorMessage('lastName')">
      <lucide-icon icon [img]="UserIcon" size="18"></lucide-icon>
    </app-auth-input>

    <app-auth-input
      formControlName="jobTitle"
      [label]="'REGISTER.JOB_TITLE' | translate"
      [placeholder]="'REGISTER.JOB_TITLE_PLACEHOLDER' | translate"
      [hasIcon]="true">
      <lucide-icon icon [img]="JobIcon" size="18"></lucide-icon>
    </app-auth-input>

    <app-auth-input
      formControlName="phone"
      type="tel"
      [label]="'REGISTER.PHONE' | translate"
      [placeholder]="'REGISTER.PHONE_PLACEHOLDER' | translate"
      [hasIcon]="true">
      <lucide-icon icon [img]="PhoneIcon" size="18"></lucide-icon>
    </app-auth-input>

    <div class="full-width">
      <app-auth-input
        formControlName="email"
        type="email"
        [label]="'REGISTER.EMAIL' | translate"
        [placeholder]="'REGISTER.EMAIL_PLACEHOLDER' | translate"
        [required]="true"
        [hasIcon]="true"
        [errorMessage]="getErrorMessage('email')">
        <lucide-icon icon [img]="MailIcon" size="18"></lucide-icon>
      </app-auth-input>
    </div>

    <div class="full-width" formGroupName="passwordGroup">
      <div class="password-grid">
        <div class="password-field-wrapper">
          <app-auth-input
            formControlName="password"
            type="password"
            [label]="'REGISTER.PASSWORD' | translate"
            [placeholder]="'REGISTER.PASSWORD_PLACEHOLDER' | translate"
            [required]="true"
            [hasIcon]="true"
            [errorMessage]="getErrorMessage('passwordGroup.password')">
            <lucide-icon icon [img]="LockIcon" size="18"></lucide-icon>
          </app-auth-input>
          <app-password-validator [password]="group.get('passwordGroup.password')?.value"></app-password-validator>
        </div>

        <app-auth-input
          formControlName="confirmPassword"
          type="password"
          [label]="'REGISTER.CONFIRM_PASSWORD' | translate"
          [placeholder]="'REGISTER.CONFIRM_PASSWORD_PLACEHOLDER' | translate"
          [required]="true"
          [hasIcon]="true"
          [errorMessage]="getErrorMessage('passwordGroup.confirmPassword')">
          <lucide-icon icon [img]="LockIcon" size="18"></lucide-icon>
        </app-auth-input>
      </div>

      <div *ngIf="group.get('passwordGroup')?.errors?.['passwordMismatch'] && group.get('passwordGroup.confirmPassword')?.touched" class="password-mismatch-error">
         <lucide-icon [img]="AlertCircleIcon" size="14"></lucide-icon>
         <span>{{ 'REGISTER.ERRORS.PASSWORD_MISMATCH' | translate }}</span>
      </div>
    </div>
  </div>
</div>
