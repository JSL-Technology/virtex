<div class="step-container" [formGroup]="parentForm">
  <div class="step-header">
    <h3 class="step-title">Acceso y Seguridad</h3>
    <p class="step-subtitle">Establece las credenciales para la cuenta principal.</p>
  </div>

  <div class="social-access">
    <button type="button" class="google-btn">
      <div class="btn-content">
        <svg width="20" height="20" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" fill-rule="evenodd">
            <path d="M17.64 9.2045c0-.6381-.0573-1.2518-.1636-1.8409H9v3.4818h4.8445c-.2086 1.125-.844 2.0782-1.7959 2.7164v2.2581h2.9087c1.7018-1.5668 2.684-3.875 2.684-6.6154z" fill="#4285F4"></path>
            <path d="M9 18c2.43 0 4.4673-.806 5.9564-2.1805l-2.9087-2.2581c-.8059.54-1.8368.86-3.0477.86-2.344 0-4.3282-1.5831-5.036-3.7104H.957v2.3318C2.4382 16.1422 5.4818 18 9 18z" fill="#34A853"></path>
            <path d="M3.964 10.71c-.18-.54-.2822-1.1168-.2822-1.71s.1023-1.17.2823-1.71V4.9582H.957C.3477 6.1732 0 7.5477 0 9s.3477 2.8268.957 4.0418L3.964 10.71z" fill="#FBBC05"></path>
            <path d="M9 3.48c1.3218 0 2.5077.4541 3.4405 1.346l2.5813-2.5814C13.4632.8918 11.425 0 9 0 5.4818 0 2.4382 1.8577.957 4.9582L3.964 7.29C4.6718 5.1632 6.6559 3.48 9 3.48z" fill="#EA4335"></path>
          </g>
        </svg>
        <span>Continuar con Google</span>
      </div>
    </button>
  </div>

  <div class="divider">
    <span>O usa tu correo electrónico</span>
  </div>

  <div class="form-grid">
    <div class="full-width">
      <app-auth-input
        formControlName="email"
        type="email"
        label="Correo Electrónico"
        placeholder="ejemplo@empresa.com"
        [required]="true"
        [hasIcon]="true"
        [errorMessage]="getErrorMessage('email')">
        <lucide-icon icon [img]="MailIcon" size="18"></lucide-icon>
      </app-auth-input>
    </div>

    <div class="full-width" formGroupName="passwordGroup">
      <div class="password-grid">
        <div class="password-wrapper">
          <app-auth-input
            formControlName="password"
            type="password"
            label="Contraseña"
            placeholder="••••••••"
            [required]="true"
            [hasIcon]="true"
            [errorMessage]="getErrorMessage('passwordGroup.password')">
            <lucide-icon icon [img]="LockIcon" size="18"></lucide-icon>
          </app-auth-input>

          <app-password-validator [password]="passwordGroup?.get?.('password')?.value || ''"></app-password-validator>
        </div>

        <app-auth-input
          formControlName="confirmPassword"
          type="password"
          label="Confirmar Contraseña"
          placeholder="••••••••"
          [required]="true"
          [hasIcon]="true"
          [errorMessage]="getErrorMessage('passwordGroup.confirmPassword')">
          <lucide-icon icon [img]="LockIcon" size="18"></lucide-icon>
        </app-auth-input>
      </div>

      <div *ngIf="passwordGroup?.errors?.['passwordMismatch'] && passwordGroup?.get?.('confirmPassword')?.touched" class="error-msg">
         <lucide-icon [img]="AlertCircleIcon" size="14"></lucide-icon>
         <span>Las contraseñas no coinciden</span>
      </div>
    </div>
  </div>
</div>
