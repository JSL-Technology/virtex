<div class="step-container" [formGroup]="group">
  <div class="step-header">
    <h3 class="step-title">{{ 'REGISTER.STEPS.CONFIGURATION.TITLE' | translate }}</h3>
    <p class="step-subtitle">{{ 'REGISTER.STEPS.CONFIGURATION.SUBTITLE' | translate }}</p>
  </div>

  <div class="form-grid">
    <!-- Country Selector -->
    <div class="form-field">
      <label class="input-label">
        {{ 'REGISTER.COUNTRY' | translate }}
      </label>
      <div class="custom-select-wrapper">
        <div class="flag-icon">
          <img [src]="'assets/flags/' + (countryService.currentCountryCode() || 'do').toLowerCase() + '.svg'"
               (error)="onFlagError($event)" alt="Flag">
        </div>
        <select
          formControlName="country"
          (change)="onCountryChange($event)"
          class="custom-select"
        >
          <option *ngFor="let c of countries" [value]="c.code">{{ c.name }}</option>
        </select>
        <div class="select-chevron">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-9"/></svg>
        </div>
      </div>
    </div>

    <!-- Currency Display (Read-Only) -->
    <div class="form-field">
      <label class="input-label">{{ 'REGISTER.CURRENCY' | translate }}</label>
      <div class="readonly-value">
        <span class="currency-code">{{ countryService.currentCountry()?.currencyCode }}</span>
        <span class="currency-name" *ngIf="countryService.currentCountry()?.currencyName">{{ countryService.currentCountry()?.currencyName }}</span>
      </div>
    </div>

    <!-- Tax ID -->
    <div class="full-width">
      <app-auth-input
        formControlName="taxId"
        [label]="countryService.currentCountry()?.formSchema?.taxId?.label || ('REGISTER.TAX_ID' | translate)"
        [placeholder]="countryService.currentCountry()?.formSchema?.taxId?.placeholder || ''"
        [required]="true"
        [hasIcon]="true"
        [errorMessage]="getTaxIdError()">
        <svg icon xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
      </app-auth-input>
    </div>
  </div>
</div>
