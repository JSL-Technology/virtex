<div class="stat-card" [attr.data-color]="data.color">
  <div class="sc-icon-wrap">
    <lucide-icon [img]="icon" size="20"></lucide-icon>
  </div>
  <div class="sc-body">
    <span class="sc-label">{{ data.title }}</span>
    <span class="sc-value">{{ data.value }}</span>
  </div>
  <div class="sc-change" [class.sc-change--up]="isPositive()" [class.sc-change--down]="!isPositive()">
    {{ data.change }}
  </div>
</div>
