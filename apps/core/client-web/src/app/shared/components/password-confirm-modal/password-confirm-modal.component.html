
<div class="modal-backdrop fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4" (click)="onCancel()" (keydown.escape)="onCancel()" tabindex="-1">
  <div class="modal-content bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-md overflow-hidden animate-in" (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()" role="dialog" aria-modal="true" aria-labelledby="modal-title">

    <!-- Header -->
    <div class="p-6 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between bg-slate-50/50 dark:bg-slate-800/30">
      <div class="flex items-center gap-3">
        <div class="p-2.5 bg-orange-100 dark:bg-orange-500/10 rounded-xl text-orange-600 dark:text-orange-500">
          <lucide-angular [img]="ShieldIcon" class="w-5 h-5"></lucide-angular>
        </div>
        <div>
          <h3 id="modal-title" class="text-lg font-bold text-slate-900 dark:text-white leading-tight">
            {{ 'AUTH.STEP_UP.TITLE' | translate }}
          </h3>
          <p class="text-[11px] font-medium text-slate-400 dark:text-slate-500 uppercase tracking-wider mt-0.5">
            Acción Protegida
          </p>
        </div>
      </div>
      <button (click)="onCancel()" class="p-2 rounded-lg text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all" aria-label="Close">
        <lucide-angular [img]="XIcon" class="w-5 h-5"></lucide-angular>
      </button>
    </div>

    <!-- Body -->
    <div class="p-8 space-y-6">
      <p class="text-[15px] leading-relaxed text-slate-600 dark:text-slate-400">
        {{ 'AUTH.STEP_UP.DESCRIPTION' | translate }}
      </p>

      <div class="space-y-2.5">
        <label for="step-up-password" class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">
          {{ 'AUTH.STEP_UP.PASSWORD_LABEL' | translate }}
        </label>
        <div class="input-group">
          <input
            id="step-up-password"
            type="password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            [disabled]="isLoading"
            class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-4 focus:ring-orange-500/10 focus:border-orange-500 outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600"
            [placeholder]="'AUTH.STEP_UP.PASSWORD_PLACEHOLDER' | translate"
            (keyup.enter)="onConfirm()"

          >
        </div>
      </div>

      <!-- Error Message -->
      <div *ngIf="error" class="error-container flex items-start gap-3 p-4 bg-red-50 dark:bg-red-900/10 border border-red-100 dark:border-red-900/20 text-red-600 dark:text-red-400 rounded-xl text-sm">
        <lucide-angular [img]="AlertIcon" class="w-5 h-5 shrink-0"></lucide-angular>
        <div class="space-y-1.5">
          <p class="font-medium">{{ error | translate }}</p>
          <p *ngIf="remainingAttempts !== null" class="text-xs opacity-80">
            {{ 'AUTH.STEP_UP.REMAINING_ATTEMPTS' | translate:{ count: remainingAttempts } }}
          </p>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="p-6 bg-slate-50/50 dark:bg-slate-800/30 border-t border-slate-100 dark:border-slate-800 flex flex-col-reverse sm:flex-row gap-3">
      <button
        (click)="onCancel()"
        [disabled]="isLoading"
        class="flex-1 px-4 py-2.5 text-sm font-semibold text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all disabled:opacity-50"
      >
        {{ 'COMMON.CANCEL' | translate }}
      </button>
      <button
        (click)="onConfirm()"
        [disabled]="!password() || isLoading"
        class="btn-confirm flex-[1.5] px-6 py-2.5 text-sm font-bold text-white bg-orange-600 hover:bg-orange-700 active:bg-orange-800 disabled:bg-slate-300 dark:disabled:bg-slate-800 disabled:text-slate-500 dark:disabled:text-slate-600 disabled:cursor-not-allowed rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-orange-600/20"
      >
        <lucide-angular *ngIf="isLoading" [img]="LoaderIcon" class="w-4 h-4 loader-spin"></lucide-angular>
        <span>{{ (isLoading ? 'COMMON.LOADING' : 'COMMON.CONFIRM') | translate }}</span>
      </button>
    </div>
  </div>
</div>
