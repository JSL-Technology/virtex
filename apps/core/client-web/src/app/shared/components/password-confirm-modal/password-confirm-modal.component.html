
<div class="modal-backdrop fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4" (click)="onCancel()">
  <div class="modal-content bg-white dark:bg-slate-900 rounded-xl shadow-2xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in duration-200" (click)="$event.stopPropagation()" role="dialog" aria-modal="true" aria-labelledby="modal-title">

    <!-- Header -->
    <div class="p-6 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="p-2 bg-orange-100 dark:bg-orange-900/30 rounded-lg text-orange-600">
          <lucide-angular [img]="ShieldIcon" class="w-5 h-5"></lucide-angular>
        </div>
        <h3 id="modal-title" class="text-lg font-semibold text-slate-900 dark:text-white">
          {{ 'AUTH.STEP_UP.TITLE' | translate }}
        </h3>
      </div>
      <button (click)="onCancel()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" aria-label="Close">
        <lucide-angular [img]="XIcon" class="w-5 h-5"></lucide-angular>
      </button>
    </div>

    <!-- Body -->
    <div class="p-6 space-y-4">
      <p class="text-sm text-slate-600 dark:text-slate-400">
        {{ 'AUTH.STEP_UP.DESCRIPTION' | translate }}
      </p>

      <div class="space-y-2">
        <label for="step-up-password" class="text-sm font-medium text-slate-700 dark:text-slate-300">
          {{ 'AUTH.STEP_UP.PASSWORD_LABEL' | translate }}
        </label>
        <div class="relative">
          <input
            id="step-up-password"
            type="password"
            [(ngModel)]="password"
            [disabled]="isLoading"
            class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition-all"
            [placeholder]="'AUTH.STEP_UP.PASSWORD_PLACEHOLDER' | translate"
            (keyup.enter)="onConfirm()"
            autofocus
          >
        </div>
      </div>

      <!-- Error Message -->
      <div *ngIf="error" class="flex items-start gap-2 p-3 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 rounded-lg text-sm animate-in slide-in-from-top-2 duration-200">
        <lucide-angular [img]="AlertIcon" class="w-4 h-4 mt-0.5 shrink-0"></lucide-angular>
        <div class="space-y-1">
          <p>{{ error | translate }}</p>
          <p *ngIf="remainingAttempts !== null" class="font-medium text-xs">
            {{ 'AUTH.STEP_UP.REMAINING_ATTEMPTS' | translate:{ count: remainingAttempts } }}
          </p>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="p-6 bg-slate-50 dark:bg-slate-800/50 flex flex-col-reverse sm:flex-row gap-3">
      <button
        (click)="onCancel()"
        class="flex-1 px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors"
      >
        {{ 'COMMON.CANCEL' | translate }}
      </button>
      <button
        (click)="onConfirm()"
        [disabled]="!password() || isLoading"
        class="flex-1 px-4 py-2 text-sm font-medium text-white bg-orange-600 hover:bg-orange-700 disabled:opacity-50 disabled:cursor-not-allowed rounded-lg transition-colors flex items-center justify-center gap-2"
      >
        <lucide-angular *ngIf="isLoading" [img]="LoaderIcon" class="w-4 h-4 animate-spin"></lucide-angular>
        {{ 'COMMON.CONFIRM' | translate }}
      </button>
    </div>
  </div>
</div>
