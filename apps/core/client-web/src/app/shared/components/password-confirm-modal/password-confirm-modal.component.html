
<div class="modal-backdrop" (click)="onCancel()">
  <div class="modal-container" (click)="$event.stopPropagation()" role="dialog" aria-modal="true" aria-labelledby="modal-title">

    <!-- Header -->
    <div class="modal-header">
      <div class="header-info">
        <div class="icon-container">
          <lucide-angular [img]="ShieldIcon" class="icon"></lucide-angular>
        </div>
        <div class="title-group">
          <h3 id="modal-title" class="modal-title">
            {{ 'AUTH.STEP_UP.TITLE' | translate }}
          </h3>
          <p class="modal-subtitle">
            Acción Protegida
          </p>
        </div>
      </div>
      <button (click)="onCancel()" class="close-btn" aria-label="Close">
        <lucide-angular [img]="XIcon" class="icon"></lucide-angular>
      </button>
    </div>

    <!-- Body -->
    <div class="modal-body">
      <p class="description">
        {{ 'AUTH.STEP_UP.DESCRIPTION' | translate }}
      </p>

      <div class="form-group">
        <label for="step-up-password" class="label">
          {{ 'AUTH.STEP_UP.PASSWORD_LABEL' | translate }}
        </label>
        <div class="input-wrapper">
          <input
            id="step-up-password"
            type="password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            [disabled]="isLoading"
            class="input"
            [placeholder]="'AUTH.STEP_UP.PASSWORD_PLACEHOLDER' | translate"
            (keyup.enter)="onConfirm()"
            autofocus
          >
        </div>
      </div>

      <!-- Error Message -->
      <div *ngIf="error" class="error-container">
        <lucide-angular [img]="AlertIcon" class="icon"></lucide-angular>
        <div class="error-details">
          <p class="error-text">{{ error | translate }}</p>
          <p *ngIf="remainingAttempts !== null" class="attempts-text">
            {{ 'AUTH.STEP_UP.REMAINING_ATTEMPTS' | translate:{ count: remainingAttempts } }}
          </p>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <button
        (click)="onCancel()"
        [disabled]="isLoading"
        class="btn-cancel"
      >
        {{ 'COMMON.CANCEL' | translate }}
      </button>
      <button
        (click)="onConfirm()"
        [disabled]="!password() || isLoading"
        class="btn-confirm"
      >
        <lucide-angular *ngIf="isLoading" [img]="LoaderIcon" class="icon spin"></lucide-angular>
        <span>{{ (isLoading ? 'COMMON.LOADING' : 'COMMON.CONFIRM') | translate }}</span>
      </button>
    </div>
  </div>
</div>
