@if (hasInput()) {
  <div class="pw-strength" [ngClass]="levelClass()">
    <div class="pw-meter" role="img" [attr.aria-label]="'Seguridad de la contraseña: ' + (label() || 'muy débil')">
      <span class="pw-meter-bar" [class.on]="strength() >= 1"></span>
      <span class="pw-meter-bar" [class.on]="strength() >= 2"></span>
      <span class="pw-meter-bar" [class.on]="strength() >= 3"></span>
      <span class="pw-meter-bar" [class.on]="strength() >= 4"></span>
    </div>

    <div class="pw-meter-label" aria-hidden="true">{{ label() }}</div>

    <ul class="pw-checklist">
      @for (check of checks(); track check.label) {
        <li class="pw-check" [class.met]="check.met">
          <span class="pw-check-icon">
            <lucide-icon [img]="check.met ? CheckIcon : XIcon" size="12"></lucide-icon>
          </span>
          <span class="pw-check-label">{{ check.label }}</span>
        </li>
      }
    </ul>
  </div>
}
